<!DOCTYPE html>
<html lang="en" data-theme="dim">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splitsies</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex-grow: 1;
        }
    </style>
</head>

<body class="bg-base-200">

    {% if user %}
    <div class="navbar bg-base-100 shadow-sm sticky top-0 z-50">
        <div class="flex-1">
            <a href="/groups" class="btn btn-ghost text-xl font-bold">Splitsies</a>
        </div>
        <div class="flex-none gap-2">
            <div class="dropdown dropdown-end">
                <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar placeholder">
                    <div class="bg-neutral text-neutral-content rounded-full w-10">
                        <span class="text-lg">{{ user.name[0] | upper }}</span>
                    </div>
                </div>
                <ul tabindex="0"
                    class="mt-3 z-[1] p-2 shadow menu menu-sm dropdown-content bg-base-100 rounded-box w-52">
                    <li class="menu-title text-opacity-50 text-xs px-4 py-2">{{ user.email }}</li>
                    <li>
                        <form action="/auth/logout" method="POST" class="w-full m-0 p-0">
                            <button type="submit"
                                class="w-full text-left text-error hover:bg-error hover:text-error-content rounded-md px-4 py-2 transition-colors">Sign
                                Out</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    {% endif %}

    <main class="container mx-auto p-4 md:p-8 max-w-7xl">
        {% block content %}{% endblock %}
    </main>

</body>

</html>
