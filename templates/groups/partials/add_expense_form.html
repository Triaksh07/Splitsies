<form id="add_expense_form" hx-post="/groups/{{ group.id }}/expenses" hx-target="#expense-list" hx-swap="innerHTML"
    class="space-y-6">
    <input type="hidden" name="participant_ids" id="participant_ids" value="">
    <input type="hidden" name="guest_names" id="guest_names" value="">
    <input type="hidden" name="split_data" id="split_data" value="{}">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Basic Details -->
        <div class="space-y-4">
            <div class="form-control">
                <label class="label"><span class="label-text font-bold">What was this for?</span></label>
                <input type="text" name="description" placeholder="E.g. Dinner at Taj"
                    class="input input-bordered w-full" required />
            </div>

            <div class="form-control">
                <label class="label"><span class="label-text font-bold">Amount & Currency</span></label>
                <div class="join w-full">
                    <select name="currency" class="select select-bordered join-item w-1/3 min-w-[5rem]">
                        <option value="INR" {% if user.preferred_currency=='INR' %}selected{% endif %}>INR</option>
                        <option value="USD" {% if user.preferred_currency=='USD' %}selected{% endif %}>USD</option>
                        <option value="GBP" {% if user.preferred_currency=='GBP' %}selected{% endif %}>GBP</option>
                    </select>
                    <input type="number" step="0.01" name="amount" id="expense_amount" placeholder="0.00"
                        class="input input-bordered join-item w-2/3 flex-1" required />
                </div>
            </div>

            <label class="form-control">
                <div class="label"><span class="label-text font-bold">Paid by *</span></div>
                <select name="paid_by_id" class="select select-bordered w-full text-base" id="paid-by-select"
                    onchange="toggleGuestPayer(this.value)" required>
                    <option value="">-- Select participant --</option>
                    {% for p in participants %}
                    <option value="{{ p.id }}" {% if p.linked_user_id==user.id %}selected{% endif %}>
                        {{ p.display_name }} {% if p.linked_user_id == user.id %}(You){% endif %}
                        {% if p.is_guest %} (Guest){% endif %}
                    </option>
                    {% endfor %}
                    <option value="0">+ Someone else (guest)</option>
                </select>
                <input type="text" name="paid_by_guest_name" id="paid-by-guest-input" placeholder="Enter their name"
                    class="input input-bordered w-full mt-2 hidden" />
            </label>

            <div class="grid grid-cols-2 gap-4">
                <div class="form-control">
                    <label class="label"><span class="label-text font-bold">Category</span></label>
                    <select name="category" class="select select-bordered w-full" required>
                        <option value="food">Food & Drink</option>
                        <option value="transport">Transport</option>
                        <option value="accommodation">Accommodation</option>
                        <option value="utilities">Utilities & Bills</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="shopping">Shopping</option>
                        <option value="other" selected>Other</option>
                    </select>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text font-bold">Date</span></label>
                    <input type="date" name="expense_date" value="{{ today }}"
                        class="input input-bordered w-full text-sm" required />
                </div>
            </div>

            <div class="form-control">
                <label class="label"><span class="label-text font-bold">Notes (Optional)</span></label>
                <input type="text" name="notes" placeholder="Any extra details..."
                    class="input input-bordered w-full" />
            </div>
        </div>

        <!-- Split Details -->
        <div class="space-y-4 bg-base-200 p-5 rounded-xl border border-base-300">
            <div class="form-control">
                <label class="label pt-0"><span class="label-text font-bold text-lg">How to split it?</span></label>
                <select name="split_type" id="split_type"
                    class="select select-bordered select-primary w-full shadow-sm text-base mb-2" required
                    onchange="toggleSplitInputs()">
                    <option value="equal" selected>Equally (=)</option>
                    <option value="exact">Exact Amounts (₹/$)</option>
                    <option value="percentage">Percentages (%)</option>
                    <option value="shares">Shares (1x, 2x)</option>
                </select>
            </div>

            <div class="divider my-2"></div>

            <div class="form-control" id="split_participants_list">
                <label class="label py-1"><span class="label-text font-semibold text-base-content/70">Select who is
                        involved</span></label>
                <div class="max-h-56 overflow-y-auto pr-2 space-y-2 mt-2 -mr-2">
                    {% for p in participants %}
                    <label
                        class="flex justify-between items-center bg-base-100 p-3 rounded-lg border border-base-300 hover:border-primary/50 transition-colors cursor-pointer group">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" class="checkbox checkbox-sm checkbox-primary participant-cb"
                                value="{{ p.id }}" checked onchange="handleCheckboxChange(this)" />
                            <span
                                class="label-text font-medium select-none group-hover:text-primary transition-colors">{{
                                p.display_name }} {% if p.linked_user_id == user.id %}(You){% endif %}{% if p.is_guest
                                %} <span class="badge badge-xs bg-base-200">Guest</span>{% endif %}</span>
                        </div>
                        <div class="split-input-container w-28 text-right hidden">
                            <!-- Input injected via JS -->
                        </div>
                    </label>
                    {% endfor %}
                    <!-- Guests added dynamically here -->
                    <div id="guest_list_container" class="space-y-2"></div>
                </div>
            </div>

            <div class="divider my-2"></div>

            <!-- Add Guest Quick Form -->
            <div class="bg-base-100 p-3 rounded-lg border border-base-300">
                <label class="label py-0 mb-1"><span
                        class="label-text font-semibold text-xs text-base-content/70 uppercase">Add a one-time
                        guest</span></label>
                <div class="flex gap-2">
                    <input type="text" id="guest_names_input" placeholder="Guest Name"
                        class="input input-sm input-bordered flex-1"
                        onkeypress="if(event.key === 'Enter') { event.preventDefault(); addGuest(); }" />
                    <button type="button" class="btn btn-sm btn-outline" onclick="addGuest()">Add</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-action mt-8 pt-4 border-t border-base-300">
        <button type="button" class="btn btn-ghost" onclick="add_expense_modal.close()">Cancel</button>
        <button type="submit" class="btn btn-primary px-8" id="submit_expense_btn" onclick="prepareSubmit()">Save
            Expense</button>
    </div>
</form>

<script>
    let tempGuestId = -1;

    function toggleGuestPayer(value) {
        const guestInput = document.getElementById('paid-by-guest-input');
        if (value === '0') {
            guestInput.classList.remove('hidden');
            guestInput.required = true;
        } else {
            guestInput.classList.add('hidden');
            guestInput.required = false;
            guestInput.value = '';
        }
    }
    function addGuest() {
        const input = document.getElementById('guest_names_input');
        const name = input.value.trim();
        if (!name) return;

        const container = document.getElementById('guest_list_container');
        const gid = `temp_${tempGuestId}`;
        tempGuestId--;

        const html = `
            <label class="flex justify-between items-center bg-base-100 p-3 rounded-lg border border-base-300 hover:border-primary/50 transition-colors cursor-pointer group" id="label_${gid}">
                <div class="flex items-center gap-3">
                    <input type="checkbox" class="checkbox checkbox-sm checkbox-primary participant-cb temp-guest-cb" value="${gid}" data-name="${name}" checked onchange="handleCheckboxChange(this)" />
                    <span class="label-text font-medium select-none text-info group-hover:text-primary transition-colors">${name} <span class="badge badge-xs badge-info">New Guest</span></span>
                </div>
                <div class="split-input-container w-28 text-right hidden"></div>
            </label>
        `;
        container.insertAdjacentHTML('beforeend', html);
        input.value = '';

        // Refresh inputs if needed
        toggleSplitInputs();

        // Add to payer dropdown temporarily 
        // (This won't work perfectly if form fails validation and re-renders, but fine for HTMX happy path)
        const payerSelect = document.querySelector('select[name="paid_by_id"]');
        const opt = document.createElement('option');
        opt.value = gid; // Will cause error if submitted as payer, backend expects int. Backend doesn't support temp guests as payers in this simplified flow.
        opt.disabled = true;
        opt.text = `${name} (must be saved first to pay)`;
        payerSelect.appendChild(opt);
    }

    function handleCheckboxChange(checkbox) {
        const container = checkbox.closest('label').querySelector('.split-input-container');
        if (checkbox.checked) {
            container.style.opacity = '1';
            const input = container.querySelector('input');
            if (input) input.disabled = false;
        } else {
            container.style.opacity = '0.5';
            const input = container.querySelector('input');
            if (input) input.disabled = true;
        }
    }

    function toggleSplitInputs() {
        const splitType = document.getElementById('split_type').value;
        const containers = document.querySelectorAll('.split-input-container');
        const limitStr = document.getElementById('expense_amount').value;
        const totalAmount = parseFloat(limitStr) || 0;

        containers.forEach(container => {
            const cb = container.closest('label').querySelector('.participant-cb');
            const pid = cb.value;

            if (splitType === 'equal') {
                container.classList.add('hidden');
                container.innerHTML = '';
            } else {
                container.classList.remove('hidden');
                container.style.opacity = cb.checked ? '1' : '0.5';

                let step = "0.01";
                let placeholder = "";
                let maxAttr = "";
                let type = "number";
                let symbol = "";
                let val = "";

                if (splitType === 'exact') {
                    placeholder = "0.00";
                    maxAttr = totalAmount > 0 ? `max="${totalAmount}"` : "";
                    symbol = "Amt";
                } else if (splitType === 'percentage') {
                    placeholder = "0.0";
                    maxAttr = 'max="100"';
                    symbol = "%";
                } else if (splitType === 'shares') {
                    placeholder = "1";
                    step = "1";
                    symbol = "x";
                    val = "1"; // Default share
                }

                container.innerHTML = `
                    <div class="join w-full">
                        <input type="${type}" step="${step}" ${maxAttr} class="input input-sm input-bordered join-item w-full text-right font-mono split-val-input" data-pid="${pid}" placeholder="${placeholder}" value="${val}" ${!cb.checked ? 'disabled' : ''} required>
                        <span class="bg-base-200 border border-base-300 join-item flex items-center px-2 text-xs font-bold text-base-content/60 w-8 justify-center">${symbol}</span>
                    </div>
                `;
            }
        });
    }

    function prepareSubmit() {
        const form = document.getElementById('add_expense_form');

        // 1. Participant IDs
        const checkedCbs = form.querySelectorAll('.participant-cb:checked');
        if (checkedCbs.length === 0) {
            alert("Please select at least one participant.");
            return;
        }

        const existingPids = [];
        const newGuestNames = [];
        checkedCbs.forEach(cb => {
            if (cb.value.startsWith('temp_')) {
                newGuestNames.push(cb.getAttribute('data-name'));
            } else {
                existingPids.push(cb.value);
            }
        });

        document.getElementById('participant_ids').value = existingPids.join(',');
        document.getElementById('guest_names').value = newGuestNames.join(',');

        // 2. Split data
        const splitType = document.getElementById('split_type').value;
        let splitData = {};

        if (splitType !== 'equal') {
            const inputs = form.querySelectorAll('.split-val-input:not([disabled])');
            let key = splitType === 'exact' ? 'amounts' : splitType === 'percentage' ? 'percentages' : 'shares';
            splitData[key] = {};
            let sum = 0;
            inputs.forEach(input => {
                const val = parseFloat(input.value) || 0;
                splitData[key][input.getAttribute('data-pid')] = splitType === 'shares' ? Math.round(val) : val.toString();
                sum += val;
            });

            if (splitType === 'percentage' && Math.abs(sum - 100) > 0.1) {
                alert(`Percentages must sum to 100. Current sum: ${sum.toFixed(1)}%`);
                return;
            }
            if (splitType === 'exact') {
                const total = parseFloat(document.getElementById('expense_amount').value) || 0;
                if (Math.abs(sum - total) > 0.05) {
                    alert(`Exact amounts must sum to ${total}. Current sum: ${sum.toFixed(2)}`);
                    return;
                }
            }
        }

        document.getElementById('split_data').value = JSON.stringify(splitData);

        // 3. Disable button and submit via HTMX
        const btn = document.getElementById('submit_expense_btn');
        btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span> Saving...';
        btn.disabled = true;

        htmx.process(form);
        htmx.trigger(form, 'submit');
    }

    // Re-enable button on HTMX response (in case form isn't wiped or throws error)
    document.body.addEventListener('htmx:afterRequest', function (evt) {
        if (evt.target.id === 'add_expense_form') {
            const btn = document.getElementById('submit_expense_btn');
            if (btn) {
                btn.innerHTML = 'Save Expense';
                btn.disabled = false;
            }
            if (evt.detail.successful && evt.detail.elt.id === "add_expense_form") {
                document.getElementById('add_expense_modal').close();
            }
        }
    });
</script>
